- name: Print clipboard string
  debug:
    msg: "vless://{{ xray_uuid.stdout }}@{{ vless.domain }}:443?type=tcp&security=reality&pbk={{ x25519_pbk.stdout }}&fp=random&sni={{ vless.domain }}&sid={{ short_ids[0] }}&spx=%2F&flow=xtls-rprx-vision"
- name: XRay outbound config 
  debug:
    msg: |
          {
            "tag": "default",
            "protocol": "vless",
            "settings": {
              "vnext": [
                {
                  "address": "{{ vless.domain }}",
                  "port": 443,
                  "users": [
                    {
                      "id": "{{ xray_uuid.stdout }}",
                      "encryption": "none",
                      "flow": "xtls-rprx-vision"
                    }
                  ]
                }
              ]
            },
            "streamSettings": {
              "network": "tcp",
              "security": "reality",
              "realitySettings": {
                "serverName": "{{ vless.domain }}",
                "fingerprint": "random",
                "publicKey": "{{ x25519_pbk.stdout }}",
                "shortId": "{{ short_ids[0] }}",
                "spiderX": ""
              }
            }
          }
- name: Sing-box outbound config
  debug:
    msg: |
          {
              "type": "vless",
              "server": "{{ vless.domain }}",
              "server_port": 443,
              "uuid": "{{ xray_uuid.stdout }}",
              "flow": "xtls-rprx-vision",
              "tls": {
                  "enabled": true,
                  "insecure": false,
                  "server_name": "{{ vless.domain }}",
                  "utls": {
                      "enabled": true,
                      "fingerprint": "random"
                  },
                  "reality": {
                      "enabled": true,
                      "public_key": "{{ x25519_pbk.stdout }}",
                      "short_id": "{{ short_ids[0] }}"
                  }
              }
          }
- name: Print PBK, SID and UUID to connect to server.
  debug:
    msg: "UUID: {{ xray_uuid.stdout }}, SID: {{ short_ids[0] }}, PBK: {{ x25519_pbk.stdout }}"
