- name: IPTables rules
  block:
    - name: Install netfilter-persistent
      apt:
        name: netfilter-persistent
        state: present
    # IPv4 rules
    - name: Allow ICMP
      ansible.builtin.iptables:
        chain: INPUT
        protocol: icmp
        jump: ACCEPT
    - name: Allow related and established connections
      ansible.builtin.iptables:
        chain: INPUT
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT
      become: yes
    - name: SSH rate limit - track new connections
      shell:
        cmd: iptables -A INPUT -p tcp --dport {{ SSH_PORT }} -m state --state NEW -m recent --set --name SSH
    - name: SSH rate limit - drop excessive connections
      shell:
        cmd: iptables -A INPUT -p tcp --dport {{ SSH_PORT }} -m state --state NEW -m recent --update --seconds 60 --hitcount 5 --name SSH -j DROP
    - name: Allow new incoming SYN packets on specified port
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ SSH_PORT }}"
        ctstate: NEW
        syn: match
        jump: ACCEPT
    - name: Allow 80, 443 connections
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_ports:
          - "80"
          - "443"
          - "{{ xhttp_port | default('2087') }}"
        jump: ACCEPT
    - name: Allow loopback in
      shell:
        cmd: iptables -A INPUT -i lo -j ACCEPT
    - name: Allow loopback out
      shell:
        cmd: iptables -A OUTPUT -o lo -j ACCEPT
    - name: INPUT DROP
      ansible.builtin.iptables:
        chain: INPUT
        policy: DROP
    # IPv6 rules
    - name: Allow ICMPv6
      ansible.builtin.iptables:
        chain: INPUT
        protocol: ipv6-icmp
        jump: ACCEPT
        ip_version: ipv6
    - name: Allow related and established connections (IPv6)
      ansible.builtin.iptables:
        chain: INPUT
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT
        ip_version: ipv6
      become: yes
    - name: SSH rate limit - track new connections (IPv6)
      shell:
        cmd: ip6tables -A INPUT -p tcp --dport {{ SSH_PORT }} -m state --state NEW -m recent --set --name SSH
    - name: SSH rate limit - drop excessive connections (IPv6)
      shell:
        cmd: ip6tables -A INPUT -p tcp --dport {{ SSH_PORT }} -m state --state NEW -m recent --update --seconds 60 --hitcount 5 --name SSH -j DROP
    - name: Allow new incoming SYN packets on specified port (IPv6)
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ SSH_PORT }}"
        ctstate: NEW
        syn: match
        jump: ACCEPT
        ip_version: ipv6
    - name: Allow 80, 443 connections (IPv6)
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_ports:
          - "80"
          - "443"
          - "{{ xhttp_port | default('2087') }}"
        jump: ACCEPT
        ip_version: ipv6
    - name: Allow loopback in (IPv6)
      shell:
        cmd: ip6tables -A INPUT -i lo -j ACCEPT
    - name: Allow loopback out (IPv6)
      shell:
        cmd: ip6tables -A OUTPUT -o lo -j ACCEPT
    - name: INPUT DROP (IPv6)
      ansible.builtin.iptables:
        chain: INPUT
        policy: DROP
        ip_version: ipv6
    - name: Save iptables rules
      shell:
        cmd: netfilter-persistent save